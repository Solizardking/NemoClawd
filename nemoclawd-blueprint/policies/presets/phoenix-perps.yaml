preset:
  name: phoenix-perps
  description: "Phoenix perpetual futures API, docs, and Vulcan release downloads"

network_policies:
  phoenix_perps:
    name: phoenix_perps
    endpoints:
      - host: perp-api.phoenix.trade
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: phoenix.trade
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: docs.phoenix.trade
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/Ellipsis-Labs/vulcan-cli/**" }
      - host: objects.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
