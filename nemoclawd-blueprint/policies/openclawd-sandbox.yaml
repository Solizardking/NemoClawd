#
# Strict baseline policy for the OpenClawd/NemoClawd sandbox.
# Principle: deny by default, allow only what's needed for core functionality.
# Dynamic updates (network_policies, inference) can be applied post-creation
# via `openclawd policy set`. Static fields are effectively creation-locked.
#
# Policy tiers (future):
#   strict  — this file. Minimum for onboard + basic agent operation.
#   relaxed — adds third-party model providers, broader web access.
#
# To add endpoints: update this file and re-run `openclawd nemoclawd migrate`
# or apply dynamically via `openclawd policy set`.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: statsig.anthropic.com
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
      - host: sentry.io
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/openclawd }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  # ── OpenClawd "phone home" ────────────────────────────────────────────
  # Minimum viable set for OpenClawd to authenticate, discover plugins,
  # and reach ClawdHub. Binary-restricted to openclawd only.
  # Docs access is read-only (GET). ClawdHub and openclawd.ai are
  # restricted to GET+POST (auth flows, plugin discovery).

  clawdhub:
    name: clawdhub
    endpoints:
      - host: clawdhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclawd }

  openclawd_api:
    name: openclawd_api
    endpoints:
      - host: openclawd.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclawd }

  openclawd_docs:
    name: openclawd_docs
    endpoints:
      - host: docs.openclawd.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclawd }

  # npm registry — needed for `openclawd plugins install` and `npm install`
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclawd }
      - { path: /usr/local/bin/npm }

  # ── Messaging — pre-allowed for agent notifications ────────────
  # Telegram Bot API is open by default so the agent can send
  # notifications and respond to chats without triggering approval.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }

  # ── Ollama (local inference) ───────────────────────────────────
  # Allow sandbox to reach Ollama on the host for DeepSolana / any
  # local model. Uses host.openclawd.internal (Docker host alias).
  ollama:
    name: ollama
    endpoints:
      - host: host.openclawd.internal
        port: 11434
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclawd }
      - { path: /usr/bin/curl }
