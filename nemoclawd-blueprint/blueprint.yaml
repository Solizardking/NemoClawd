version: "0.1.0"
min_openclawd_version: "2026.6.0"
min_nemoclawd_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - ncp
  - nim-local
  - vllm

description: |
  NemoClawd blueprint: orchestrates OpenClawd sandbox creation, migration,
  and NVIDIA NIM/vLLM inference routing inside the OpenClawd sandbox runtime.

components:
  sandbox:
    image: "ghcr.io/x402agent/nemoclawd:latest"
    name: "nemoclawd"
    forward_ports:
      - 18789

  inference:
    profiles:
      default:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

  blockchain_oracle:
    enabled: true
    name: "nemoclawd-blockchain-oracle"
    upstream: "hermes-blockchain-oracle"
    description: "Solana wallet, token, transaction, NFT, whale, and network intelligence MCP server."
    transport: "stdio"
    package: "hermes-blockchain-oracle"
    command: "python"
    args:
      - "-m"
      - "hermes_blockchain_oracle"
    env:
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}"
      RPC_URL: "${RPC_URL:-}"
      HELIUS_API_KEY: "${HELIUS_API_KEY:-}"
      CLAWD_TOKEN: "8cHzQHUS2s2h8TzCmfqPKYiM4dSt4roa3n7MyRLApump"
      WHALE_THRESHOLD_SOL: "1000"
      CACHE_TTL_SECONDS: "30"
    tools:
      - solana_wallet_info
      - solana_transaction
      - solana_token_info
      - solana_recent_activity
      - solana_nft_portfolio
      - whale_detector
      - solana_network_stats
    policy_presets:
      - "policies/presets/solana-rpc.yaml"
      - "policies/presets/hermes-blockchain-oracle.yaml"

  policy:
    base: "policies/openclawd-sandbox.yaml"
    presets:
      - "policies/presets/solana-rpc.yaml"
      - "policies/presets/hermes-blockchain-oracle.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            protocol: rest
